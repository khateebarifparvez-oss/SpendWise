<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#c85a2a"/>
  <!-- Bar 1 (short) -->
  <rect x="5" y="20" width="5" height="7" rx="1.5" fill="white" opacity="0.6"/>
  <!-- Bar 2 (tall) -->
  <rect x="13.5" y="10" width="5" height="17" rx="1.5" fill="white"/>
  <!-- Bar 3 (medium) -->
  <rect x="22" y="15" width="5" height="12" rx="1.5" fill="white" opacity="0.85"/>
  <!-- Trend line -->
  <polyline points="7.5,18 16,9 24.5,13" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Dots on trend line -->
  <circle cx="7.5" cy="18" r="1.5" fill="white"/>
  <circle cx="16" cy="9" r="1.5" fill="white"/>
  <circle cx="24.5" cy="13" r="1.5" fill="white"/>
</svg>